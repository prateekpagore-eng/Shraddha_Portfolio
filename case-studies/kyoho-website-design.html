<!doctype html>
<!--
  Kyoho Website Design — Case Study
  PDF rendered via PDF.js (canvas) — no iframe, no PDF chrome, looks like a normal page.
  PDF file: ../pdfs/kyoho.pdf
  Back: ../index.html
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kyoho Website Design — Case Study | Shraddha Thorat</title>
  <meta name="description" content="Kyoho website design case study by Shraddha Thorat, product designer.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@400;700&family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #d9d9d9;
      color: #111;
      font-family: 'Geist', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    #cs-header {
      position: sticky;
      top: 0;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 100px;
      background: rgba(217, 217, 217, 0.75);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid rgba(255,255,255,0.5);
      box-shadow: 0 1px 24px rgba(0,0,0,0.06);
    }
    #cs-header .cs-wordmark {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.04em;
      color: #000;
      text-decoration: none;
    }
    #cs-header .cs-back {
      font-size: 14px;
      font-weight: 500;
      color: #000;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      opacity: 0.7;
      transition: opacity 0.15s;
    }
    #cs-header .cs-back:hover { opacity: 1; }
    @media (max-width: 809px) {
      #cs-header { padding: 14px 20px; }
    }

    /* ── PDF canvas pages ── */
    #pdf-container {
      width: 100%;
      background: #d9d9d9;
    }
    #pdf-container canvas {
      display: block;
      width: 100% !important;
      height: auto !important;
      margin: 0;
      padding: 0;
    }

    /* ── Loading state ── */
    #pdf-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 40px;
      font-size: 15px;
      color: rgba(0,0,0,0.4);
      font-family: 'Geist', sans-serif;
      letter-spacing: -0.02em;
    }
  </style>
</head>
<body>
  <header id="cs-header">
    <a class="cs-wordmark" href="../index.html">Shraddha Thorat</a>
    <a class="cs-back" href="../index.html">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Back to Portfolio
    </a>
  </header>

  <div id="pdf-loading">Loading case study…</div>
  <div id="pdf-container"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    var pdfUrl = '../pdfs/kyoho.pdf';
    var container = document.getElementById('pdf-container');
    var loading  = document.getElementById('pdf-loading');

    pdfjsLib.getDocument(pdfUrl).promise.then(function(pdf) {
      loading.style.display = 'none';

      // Pre-create canvases in order so pages appear top-to-bottom
      var canvases = [];
      for (var i = 0; i < pdf.numPages; i++) {
        var canvas = document.createElement('canvas');
        container.appendChild(canvas);
        canvases.push(canvas);
      }

      // Render each page into its pre-placed canvas
      for (var pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
        (function(canvas, num) {
          pdf.getPage(num).then(function(page) {
            var containerWidth = container.offsetWidth || window.innerWidth;
            var baseViewport   = page.getViewport({ scale: 1 });
            var scale          = containerWidth / baseViewport.width;
            var viewport       = page.getViewport({ scale: scale });

            canvas.width  = viewport.width;
            canvas.height = viewport.height;

            page.render({
              canvasContext: canvas.getContext('2d'),
              viewport: viewport
            });
          });
        })(canvases[pageNum - 1], pageNum);
      }
    }).catch(function(err) {
      loading.textContent = 'Could not load PDF. ' + err.message;
    });
  </script>
</body>
</html>
