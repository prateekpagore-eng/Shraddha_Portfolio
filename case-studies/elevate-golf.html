<!doctype html>
<!--
  Elevate Golf — Case Study
  Standalone page: NO Framer JS, no hydration, no MJS bundles.
  PDF is served from ../pdfs/elevate-golf.pdf (committed to repo).
  Back link: ../index.html (full page reload; Framer hydrates normally on portfolio).
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Elevate Golf — Case Study | Shraddha Thorat</title>
  <meta name="description" content="Elevate Golf website design case study by Shraddha Thorat, product designer.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@400;700&family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #d9d9d9;
      color: #111;
      font-family: 'Geist', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    #cs-header {
      position: sticky;
      top: 0;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 100px;
      background: rgba(217, 217, 217, 0.7);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid rgba(255,255,255,0.5);
      box-shadow: 0 1px 24px rgba(0,0,0,0.06);
    }
    #cs-header .cs-wordmark {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.04em;
      color: #000;
      text-decoration: none;
    }
    #cs-header .cs-back {
      font-size: 14px;
      font-weight: 500;
      color: #000;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      opacity: 0.7;
      transition: opacity 0.15s;
    }
    #cs-header .cs-back:hover { opacity: 1; }
    @media (max-width: 809px) {
      #cs-header { padding: 14px 20px; }
    }

    /* ── Main layout ── */
    .cs-main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 60px 40px 80px;
    }
    @media (max-width: 809px) {
      .cs-main { padding: 40px 20px 60px; }
    }

    /* ── Hero info ── */
    .cs-hero {
      margin-bottom: 48px;
    }
    .cs-tag {
      display: inline-block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.5);
      background: rgba(0,0,0,0.07);
      padding: 6px 14px;
      border-radius: 100px;
      margin-bottom: 20px;
    }
    .cs-title {
      font-family: 'Antonio', sans-serif;
      font-size: 72px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.03em;
      color: #111;
      margin-bottom: 12px;
    }
    .cs-subtitle {
      font-family: 'Antonio', sans-serif;
      font-size: 32px;
      font-weight: 400;
      color: rgba(0,0,0,0.45);
      margin-bottom: 20px;
    }
    .cs-desc {
      font-size: 16px;
      line-height: 1.65;
      color: rgba(0,0,0,0.6);
      max-width: 640px;
    }
    @media (max-width: 809px) {
      .cs-title { font-size: 44px; }
      .cs-subtitle { font-size: 22px; }
    }

    /* ── PDF viewer — full-bleed, no card ── */
    .cs-pdf-embed {
      display: block;
      width: 100%;
      height: 100vh;
      border: none;
      margin: 0;
      padding: 0;
    }
  </style>
</head>
<body>
  <header id="cs-header">
    <a class="cs-wordmark" href="../index.html">Shraddha Thorat</a>
    <a class="cs-back" href="../index.html">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Back to Portfolio
    </a>
  </header>

  <main class="cs-main">
    <div class="cs-hero">
      <div class="cs-tag">Website Design</div>
      <h1 class="cs-title">Elevate Golf</h1>
      <p class="cs-subtitle">Website Design</p>
      <p class="cs-desc">A premium digital experience for a golf brand — balancing performance, aesthetics, and conversion. Designed to feel as refined as the sport itself.</p>
    </div>
  </main>

  <iframe
    class="cs-pdf-embed"
    src="../pdfs/elevate-golf.pdf"
    title="Elevate Golf Case Study PDF"
  ></iframe>
</body>
</html>
